<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strict Contract D3 Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f8f9fa;
        }
        .dashboard-header {
            background-color: #343a40;
            color: white;
            padding: 1rem 0;
            margin-bottom: 2rem;
        }
        .card {
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: none;
            margin-bottom: 20px;
        }
        .chart-container {
            width: 100%;
            height: 400px;
            position: relative;
        }
        .tooltip {
            position: absolute;
            text-align: center;
            padding: 10px;
            font: 14px sans-serif;
            background: rgba(33, 37, 41, 0.9);
            color: #fff;
            border-radius: 8px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #loading-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 500;
            font-size: 1.5rem;
            color: #0d6efd;
        }
        .hidden { display: none !important; }
        .error-message {
            color: #dc3545;
            text-align: center;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <header class="dashboard-header text-center">
        <h1>Metrics Dashboard</h1>
        <p class="lead">Strict Contract Adherence Demo</p>
    </header>

    <div class="container">
        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card p-3 flex-row align-items-center justify-content-between">
                    <div>
                        <strong>Filters:</strong>
                        <span id="active-region" class="badge bg-primary ms-2">All Regions</span>
                        <span id="active-type" class="badge bg-secondary ms-2">All Types</span>
                    </div>
                    <div>
                        <button id="refresh-btn" class="btn btn-outline-secondary btn-sm">Refresh Data</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-12">
                <div class="card p-4">
                    <h3 class="mb-4 text-center">Category Values</h3>
                    <div class="chart-container" id="main-chart">
                        <div id="loading-overlay">Loading Data...</div>
                        <div id="error-overlay" class="hidden error-message">
                            <h4>Failed to load data</h4>
                            <p>Please check the console for details.</p>
                            <button id="retry-btn" class="btn btn-danger mt-2">Retry</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/generic_dashboard.js"></script>
</body>
</html>
